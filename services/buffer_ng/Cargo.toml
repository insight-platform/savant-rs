[package]
name = "savant-buffer-ng"
version.workspace = true
edition.workspace = true
authors.workspace = true
description = "Savant Buffer NG service binary: on-disk buffering for backpressure."
homepage.workspace = true
repository.workspace = true
readme.workspace = true
keywords.workspace = true
categories = ["multimedia::video", "database"]
license.workspace = true
rust-version.workspace = true

[lib]
name = "buffer_ng"
path = "src/lib.rs"

[[bin]]
name = "buffer_ng"
path = "src/main.rs"

[dependencies]

anyhow = { workspace = true }
bitcode = { workspace = true, features=["serde"] }
chrono = { workspace = true }
crossbeam = { workspace = true }
ctrlc = { workspace = true }
derive_builder = { workspace = true }
env_logger = { workspace = true }
hashbrown = { workspace = true }
log = { workspace = true }
parking_lot = { workspace = true }
pyo3 = { workspace = true, features = ["auto-initialize"] }
rocksdb = { workspace = true }
savant_core = { workspace = true }
savant_core_py = { workspace = true }
savant_rs = { workspace = true }
savant_services_common = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
twelf = { workspace = true }

[dev-dependencies]
serial_test = { workspace = true }
tempfile = { workspace = true }
criterion = { workspace = true }

[[bench]]
name = "bench_rocksdb"
harness = false
