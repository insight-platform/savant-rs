[package]
name = "picasso"
version.workspace = true
edition.workspace = true
authors.workspace = true
description = "GPU-accelerated video frame processing pipeline with encoding and Skia rendering"
homepage.workspace = true
repository.workspace = true
readme.workspace = true
keywords.workspace = true
categories.workspace = true
license.workspace = true
rust-version.workspace = true

[lib]
crate-type = ["rlib"]

[dependencies]
savant_core = { path = "../../savant_core/savant_core" }
deepstream_encoders = { path = "../encoders" }
deepstream_nvbufsurface = { path = "../nvbufsurface", features = ["skia"] }
gstreamer = { workspace = true }
skia-safe = { workspace = true }
crossbeam = { workspace = true }
parking_lot = { workspace = true }
hashbrown = { workspace = true }
anyhow = { workspace = true }
thiserror = { workspace = true }
log = { workspace = true }

[dev-dependencies]
deepstream_nvbufsurface = { path = "../nvbufsurface", features = ["testing"] }
env_logger = "0.11"
nvidia_gpu_utils = { workspace = true }
serial_test = { workspace = true }
gstreamer-video = { workspace = true }
imagehash = "0.3"
image = { version = "0.24", default-features = false, features = [
    "jpeg",
    "png",
] }
criterion = { workspace = true }

[[bench]]
name = "skia_pipeline"
harness = false

[[bench]]
name = "bench_drop"
harness = false

[[bench]]
name = "bench_bypass"
harness = false

[[bench]]
name = "bench_sync_hevc_render"
harness = false
