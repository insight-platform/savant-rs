[package]
name = "savant-picasso"
version.workspace = true
edition.workspace = true
authors.workspace = true
description = "GPU-accelerated video frame processing pipeline with encoding and Skia rendering"
homepage.workspace = true
repository.workspace = true
readme.workspace = true
keywords.workspace = true
categories = ["multimedia::video", "rendering"]
license.workspace = true
rust-version.workspace = true

[lib]
name = "picasso"
crate-type = ["rlib"]

[dependencies]
savant_core = { workspace = true }
deepstream_encoders = { workspace = true }
deepstream_buffers = { workspace = true, features = ["skia"] }
gstreamer = { workspace = true }
skia-safe = { workspace = true }
crossbeam = { workspace = true }
parking_lot = { workspace = true }
hashbrown = { workspace = true }
anyhow = { workspace = true }
thiserror = { workspace = true }
log = { workspace = true }

[dev-dependencies]
deepstream_buffers = { workspace = true }
env_logger = { workspace = true }
nvidia_gpu_utils = { workspace = true }
serial_test = { workspace = true }
gstreamer-video = { workspace = true }
imagehash = { workspace = true }
image = { workspace = true }
criterion = { workspace = true }

[[bench]]
name = "skia_pipeline"
harness = false

[[bench]]
name = "bench_drop"
harness = false

[[bench]]
name = "bench_bypass"
harness = false

[[bench]]
name = "bench_sync_hevc_render"
harness = false

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]
