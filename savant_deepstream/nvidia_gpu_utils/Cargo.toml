[package]
name = "nvidia_gpu_utils"
version.workspace = true
edition.workspace = true
authors.workspace = true
description = "Platform-aware GPU memory monitoring, Jetson model detection, and NVENC capability queries (NVML on dGPU, /proc/meminfo on Jetson)"
homepage.workspace = true
repository.workspace = true
readme.workspace = true
keywords.workspace = true
categories.workspace = true
license.workspace = true
rust-version.workspace = true

[lib]
crate-type = ["rlib"]

[[bin]]
name = "nvidia_gpu_info"
path = "src/main.rs"

[dependencies]
clap = { workspace = true }
thiserror = { workspace = true }

[target.'cfg(target_arch = "x86_64")'.dependencies]
nvml-wrapper = "0.12"

[dev-dependencies]
deepstream_nvbufsurface = { path = "../nvbufsurface" }
gstreamer = { workspace = true }
serial_test = { workspace = true }
