[package]
name = "savant-nvidia-gpu-utils"
version.workspace = true
edition.workspace = true
authors.workspace = true
description = "Platform-aware GPU memory monitoring, Jetson model detection, and NVENC capability queries (NVML on dGPU, /proc/meminfo on Jetson)"
homepage.workspace = true
repository.workspace = true
readme = "README.md"
keywords.workspace = true
categories = ["hardware-support", "command-line-utilities"]
license.workspace = true
rust-version.workspace = true

[lib]
name = "nvidia_gpu_utils"
crate-type = ["rlib"]

[[bin]]
name = "nvidia_gpu_info"
path = "src/main.rs"

[dependencies]
clap = { workspace = true }
thiserror = { workspace = true }

[target.'cfg(target_arch = "x86_64")'.dependencies]
nvml-wrapper = { workspace = true }

[dev-dependencies]
deepstream_buffers = { workspace = true }
gstreamer = { workspace = true }
serial_test = { workspace = true }

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]
