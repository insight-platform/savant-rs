[package]
name = "picasso_py"
version.workspace = true
edition.workspace = true
authors.workspace = true
description = "Python bindings for the Picasso GPU video processing pipeline"
homepage.workspace = true
repository.workspace = true
readme.workspace = true
keywords.workspace = true
categories.workspace = true
license.workspace = true
rust-version.workspace = true

[lib]
name = "picasso_rs"
crate-type = ["cdylib"]

[dependencies]
picasso = { path = "../picasso" }
savant_core = { path = "../../savant_core" }
savant_core_py = { path = "../../savant_core_py" }
deepstream_encoders = { path = "../deepstream_encoders" }
deepstream_nvbufsurface = { path = "../deepstream_nvbufsurface", features = ["skia"] }
gstreamer = { workspace = true }
glib = { workspace = true }
pyo3 = { workspace = true, features = ["extension-module"] }
log = { workspace = true }
skia-safe = { version = "0.91", features = ["gl", "egl", "textlayout"] }

[build-dependencies]
pyo3-build-config = { workspace = true }
